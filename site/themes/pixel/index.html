<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server</title>
  <script>try{var _n=localStorage.getItem('mc_site_name');if(_n)document.title=_n}catch(e){}</script>
  <meta name="description" content="Minecraft 服务器官网" />
  <link rel="stylesheet" href="../shared/css/reset.css" />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="css/style.css?v=3" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <script src="vendor/js/echarts.min.js"></script>
  <script src="vendor/js/lucide.min.js"></script>
  <script>
  (function(){
    try {
      var ts = JSON.parse(localStorage.getItem('mc_theme_cache') || '{}');
      if (!Object.keys(ts).length) return;
      var s = document.createElement('style');
      s.id = 'theme-preload';
      var css = '';
      var accents = {green:'#4ade80',amber:'#fbbf24',cyan:'#22d3ee',red:'#f87171',purple:'#a78bfa'};
      var glows = {green:'rgba(74,222,128,0.35)',amber:'rgba(251,191,36,0.35)',cyan:'rgba(34,211,238,0.35)',red:'rgba(248,113,113,0.35)',purple:'rgba(167,139,250,0.35)'};
      var ac = accents[ts.accent_color] || '#4ade80';
      var gl = glows[ts.accent_color] || 'rgba(74,222,128,0.35)';
      css += ':root{--accent:'+ac+';--accent-glow:'+gl+'}';
      if (ts.scanlines === '0' || ts.scanlines === false) css += '#scanlines{display:none}';
      s.textContent = css;
      document.head.appendChild(s);
    } catch(e){}
  })();
  </script>
</head>
<body>

  <div class="scanlines" id="scanlines"></div>

  <!-- ===== OS Desktop ===== -->
  <div class="os-desktop" id="desktop">
    <div class="desktop-bg" id="desktop-bg"></div>

    <!-- Desktop Icons (left column) -->
    <div class="desktop-icons" id="desktop-icons">
      <button class="desktop-icon" data-app="status">
        <span class="dicon-img dicon--status"></span>
        <span class="dicon-label">状态</span>
      </button>
      <button class="desktop-icon" data-app="gallery" id="icon-gallery">
        <span class="dicon-img dicon--gallery"></span>
        <span class="dicon-label">图集</span>
      </button>
      <button class="desktop-icon" data-app="news">
        <span class="dicon-img dicon--news"></span>
        <span class="dicon-label">动态</span>
      </button>
      <button class="desktop-icon" data-app="comments" id="icon-comments">
        <span class="dicon-img dicon--chat"></span>
        <span class="dicon-label">留言</span>
      </button>
      <button class="desktop-icon" data-app="whitelist" id="icon-whitelist">
        <span class="dicon-img dicon--list"></span>
        <span class="dicon-label">白名单</span>
      </button>
    </div>

    <!-- ===== Welcome Window (replaces Hero) ===== -->
    <div class="os-window os-window--dialog" id="win-welcome" data-app="welcome"
         style="width:520px;height:auto;top:50%;left:50%;transform:translate(-50%,-50%);">
      <div class="window-titlebar">
        <span class="window-title">
          <span class="wt-icon">▶</span>
          <span id="win-welcome-title">Welcome</span>
        </span>
        <div class="window-controls">
          <button class="win-btn" data-action="minimize" title="最小化">─</button>
          <button class="win-btn" data-action="maximize" title="最大化">□</button>
          <button class="win-btn" data-action="close" title="关闭">×</button>
        </div>
      </div>
      <div class="window-body welcome-body">
        <div class="welcome-hero">
          <h1 class="welcome-title" id="hero-title">Minecraft Server</h1>
          <div class="welcome-motd" id="hero-motd">&nbsp;</div>
        </div>
        <div class="welcome-bar"></div>
        <div class="welcome-footer">
          <div class="welcome-address">
            <span class="wa-label">服务器地址</span>
            <code class="wa-value" id="server-address">加载中...</code>
            <button class="px-btn px-btn--sm" id="copy-btn">复制</button>
          </div>
          <div class="welcome-stats">
            <span class="ws-dot"><span class="status-dot" id="hero-status-dot"></span> <span id="hero-status-text">检测中</span></span>
            <span class="ws-hud">
              <span class="hud-track"><span class="hud-fill" id="hud-fill"></span></span>
              <span class="hud-text"><span id="hero-online">-</span>/<span id="hero-max">-</span></span>
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Status Window ===== -->
    <div class="os-window" id="win-status" data-app="status" hidden
         style="width:500px;height:420px;top:60px;left:180px;">
      <div class="window-titlebar">
        <span class="window-title"><span class="wt-icon">⬛</span> 状态.exe</span>
        <div class="window-controls">
          <button class="win-btn" data-action="minimize">─</button>
          <button class="win-btn" data-action="maximize">□</button>
          <button class="win-btn" data-action="close">×</button>
        </div>
      </div>
      <div class="window-tabs">
        <button class="wtab active" data-tab="overview">概览</button>
        <button class="wtab" data-tab="players">玩家</button>
        <button class="wtab" data-tab="chart">图表</button>
      </div>
      <div class="window-body">
        <div class="tab-pane active" data-pane="overview">
          <div class="stat-grid">
            <div class="stat-cell"><span class="stat-key">在线玩家</span><span class="stat-val" id="stat-online">0</span></div>
            <div class="stat-cell"><span class="stat-key">游戏版本</span><span class="stat-val" id="stat-version">-</span></div>
            <div class="stat-cell"><span class="stat-key">网络延迟</span><span class="stat-val" id="stat-latency">-</span></div>
            <div class="stat-cell"><span class="stat-key">查询耗时</span><span class="stat-val" id="stat-querytime">-</span></div>
          </div>
        </div>
        <div class="tab-pane" data-pane="players">
          <div id="player-list-section">
            <div class="player-list-wrap" id="player-list"></div>
          </div>
        </div>
        <div class="tab-pane" data-pane="chart">
          <div id="chart-section">
            <div id="player-chart" style="width:100%;height:240px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Gallery Window ===== -->
    <div class="os-window" id="win-gallery" data-app="gallery" hidden
         style="width:660px;height:480px;top:40px;left:220px;">
      <div class="window-titlebar">
        <span class="window-title"><span class="wt-icon">⬜</span> 图集.exe</span>
        <div class="window-controls">
          <button class="win-btn" data-action="minimize">─</button>
          <button class="win-btn" data-action="maximize">□</button>
          <button class="win-btn" data-action="close">×</button>
        </div>
      </div>
      <div class="window-toolbar" id="gallery-categories"></div>
      <div class="window-body window-body--scroll">
        <div class="gallery-grid" id="gallery-grid"></div>
        <div class="load-more" id="gallery-more" style="display:none">
          <button class="px-btn" id="gallery-load-more">加载更多</button>
        </div>
      </div>
    </div>

    <!-- ===== News Window (file-manager split) ===== -->
    <div class="os-window os-window--wide" id="win-news" data-app="news" hidden
         style="width:760px;height:480px;top:50px;left:200px;">
      <div class="window-titlebar">
        <span class="window-title"><span class="wt-icon">▦</span> 动态.exe</span>
        <div class="window-controls">
          <button class="win-btn" data-action="minimize">─</button>
          <button class="win-btn" data-action="maximize">□</button>
          <button class="win-btn" data-action="close">×</button>
        </div>
      </div>
      <div class="window-toolbar" id="news-categories"></div>
      <div class="window-body window-body--split">
        <div class="split-list">
          <div class="file-list" id="news-list"></div>
          <div class="load-more" id="news-more" style="display:none">
            <button class="px-btn" id="news-load-more">更多</button>
          </div>
        </div>
        <div class="split-preview" id="news-preview">
          <div class="preview-placeholder">选择一篇文章查看</div>
          <div class="preview-content" style="display:none">
            <h2 class="preview-title" id="post-detail-title"></h2>
            <div class="post-meta" id="post-detail-meta"></div>
            <div class="preview-body post-body" id="post-detail-body"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Comments Window (chat room) ===== -->
    <div class="os-window" id="win-comments" data-app="comments" hidden
         style="width:480px;height:460px;top:70px;left:260px;">
      <div class="window-titlebar">
        <span class="window-title"><span class="wt-icon">▨</span> 留言.exe</span>
        <div class="window-controls">
          <button class="win-btn" data-action="minimize">─</button>
          <button class="win-btn" data-action="maximize">□</button>
          <button class="win-btn" data-action="close">×</button>
        </div>
      </div>
      <div class="window-body chat-body">
        <div class="chat-messages" id="comment-marquee">
          <div id="comment-list"></div>
        </div>
        <form class="chat-input" id="comment-form">
          <div class="chat-fields">
            <input type="text" id="comment-nickname" placeholder="昵称" required />
            <input type="email" id="comment-email" placeholder="邮箱（选填）" />
          </div>
          <input type="text" name="website" id="comment-hp" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;" />
          <input type="hidden" id="comment-ts" />
          <div class="chat-compose">
            <textarea id="comment-content" placeholder="说点什么..." rows="2" required></textarea>
            <button type="submit" class="px-btn">发送</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ===== Whitelist Window ===== -->
    <div class="os-window" id="win-whitelist" data-app="whitelist" hidden
         style="width:460px;height:440px;top:80px;left:240px;">
      <div class="window-titlebar">
        <span class="window-title"><span class="wt-icon">▤</span> 白名单.exe</span>
        <div class="window-controls">
          <button class="win-btn" data-action="minimize">─</button>
          <button class="win-btn" data-action="maximize">□</button>
          <button class="win-btn" data-action="close">×</button>
        </div>
      </div>
      <div class="window-tabs">
        <button class="wtab active" data-tab="wl-apply">申请</button>
        <button class="wtab" data-tab="wl-check">查询</button>
      </div>
      <div class="window-body">
        <div class="tab-pane active" data-pane="wl-apply">
          <form id="whitelist-form" class="wl-form">
            <label class="form-label">游戏ID</label>
            <input type="text" id="wl-player-name" placeholder="你的游戏名称" required />
            <label class="form-label">版本</label>
            <select id="wl-platform">
              <option value="java">Java 版</option>
              <option value="bedrock">基岩版</option>
            </select>
            <label class="form-label">联系方式</label>
            <input type="text" id="wl-contact" placeholder="QQ / 邮箱（选填）" />
            <label class="form-label">申请理由</label>
            <textarea id="wl-reason" placeholder="为什么想加入？" rows="3"></textarea>
            <input type="text" name="website" id="wl-hp" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;" />
            <input type="hidden" id="wl-ts" />
            <button type="submit" class="px-btn" style="margin-top:8px">提交申请</button>
          </form>
        </div>
        <div class="tab-pane" data-pane="wl-check">
          <div class="wl-form">
            <label class="form-label">游戏ID</label>
            <div class="input-row">
              <input type="text" id="wl-check-name" placeholder="输入游戏ID查询" />
              <button class="px-btn" id="wl-check-btn">查询</button>
            </div>
            <div id="wl-check-result"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /os-desktop -->

  <!-- ===== Taskbar (bottom fixed) ===== -->
  <div class="taskbar" id="taskbar">
    <button class="taskbar-start" id="start-btn">
      <span class="start-pixel">▶</span> 开始
    </button>
    <div class="taskbar-divider"></div>
    <div class="taskbar-tabs" id="taskbar-tabs"></div>
    <div class="taskbar-tray" id="taskbar-tray">
      <span class="tray-item tray-status">
        <span class="status-dot tray-dot"></span>
        <span id="tray-online">-</span>
      </span>
      <span class="tray-divider"></span>
      <span class="tray-item" id="footer-text"></span>
      <span class="tray-item" id="footer-copyright"></span>
      <span class="tray-item" id="footer-icp"></span>
      <span class="tray-item" id="footer-social"></span>
      <span class="tray-item" id="footer-links"></span>
    </div>
  </div>

  <!-- ===== Start Menu ===== -->
  <div class="start-menu" id="start-menu" hidden>
    <div class="start-sidebar">
      <span class="start-sidebar-text" id="nav-logo">MC Server</span>
    </div>
    <div class="start-items">
      <button class="start-item" data-app="welcome"><span class="si-icon si--welcome"></span> Welcome</button>
      <button class="start-item" data-app="status"><span class="si-icon si--status"></span> 状态</button>
      <button class="start-item" data-app="gallery" id="menu-gallery"><span class="si-icon si--gallery"></span> 图集</button>
      <button class="start-item" data-app="news"><span class="si-icon si--news"></span> 动态</button>
      <button class="start-item" data-app="comments" id="menu-comments"><span class="si-icon si--chat"></span> 留言</button>
      <button class="start-item" data-app="whitelist" id="menu-whitelist"><span class="si-icon si--list"></span> 白名单</button>
    </div>
  </div>

  <script src="../shared/js/api-client.js"></script>
  <script src="../shared/js/utils.js"></script>
  <script src="../shared/js/toast.js"></script>
  <script src="../shared/js/lightbox.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js?v=4"></script>
  <script>lucide.createIcons();</script>
</body>
</html>

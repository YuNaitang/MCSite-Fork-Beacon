<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Demo — Starter Mocha</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --rosewater: #f5e0dc;
  --pink: #f5c2e7;
  --mauve: #cba6f7;
  --red: #f38ba8;
  --green: #a6e3a1;
  --teal: #94e2d5;
  --sapphire: #74c7ec;
  --blue: #89b4fa;
  --lavender: #b4befe;
  --text: #cdd6f4;
  --subtext-1: #bac2de;
  --subtext-0: #a6adc8;
  --overlay-2: #9399b2;
  --overlay-1: #7f849c;
  --overlay-0: #6c7086;
  --surface-2: #585b70;
  --surface-1: #45475a;
  --surface-0: #313244;
  --base: #1e1e2e;
  --mantle: #181825;
  --crust: #11111b;

  --bg-main: #1e1e2e;
  --container-width: 1200px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg-main);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ==================== Hero ==================== */
.hero {
  position: relative;
  height: 100vh;
  min-height: 600px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  --hero-text: #cdd6f4;
  --hero-text-sub: #bac2de;
  --hero-text-muted: #6c7086;
  --hero-divider: rgba(69,71,90,0.5);
  --hero-addr-bg: rgba(49,50,68,0.85);
  --hero-addr-border: rgba(69,71,90,0.4);
  --hero-btn-bg: #cdd6f4;
  --hero-btn-color: #1e1e2e;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(203,166,247,0.04) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 60%, rgba(116,199,236,0.03) 0%, transparent 50%),
              #1e1e2e;
  z-index: 0;
}

.hero-particles {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.container {
  max-width: var(--container-width);
  margin: 0 auto;
  padding: 0 20px;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 900px;
  padding: 0 40px;
}

/* ===== 标题 ===== */
.hero-title {
  font-size: 72px;
  font-weight: 800;
  letter-spacing: -3px;
  line-height: 1.1;
  color: var(--hero-text);
  text-shadow: 0 2px 40px rgba(0,0,0,0.4);
  margin-bottom: 40px;
}

/* ===== MOTD ===== */
.hero-motd-wrap {
  margin-bottom: 40px;
  display: flex;
  justify-content: center;
}

.hero-motd {
  display: inline-block;
  background: rgba(205,214,244,0.06);
  color: rgba(205,214,244,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(205,214,244,0.05);
  font-family: 'JetBrains Mono', monospace;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 14px;
  letter-spacing: 0.02em;
  padding: 10px 24px;
  border-radius: 8px;
  max-width: 700px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== Stats 横排 ===== */
.hero-stats {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  margin-bottom: 40px;
}

.hero-stat {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.hero-stat-value {
  font-size: 36px;
  font-weight: 700;
  color: var(--hero-text);
}

.hero-stat-label {
  font-size: 12px;
  color: var(--hero-text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.hero-stat-divider {
  width: 1px;
  height: 40px;
  background: var(--hero-divider);
}

.status-dot {
  display: inline-block;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--overlay-0);
  transition: background 0.3s;
}

/* ===== 地址 ===== */
.hero-address {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--hero-addr-bg);
  border: 1px solid var(--hero-addr-border);
  border-radius: 50px;
  padding: 12px 12px 12px 24px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.address-label {
  font-size: 13px;
  color: var(--hero-text-muted);
}

.address-value {
  font-size: 15px;
  font-weight: 500;
  color: var(--hero-text);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.03em;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.copy-btn {
  padding: 8px 18px;
  border-radius: 20px;
  background: var(--hero-btn-bg);
  color: var(--hero-btn-color);
  font-size: 13px;
  font-weight: 600;
  transition: opacity 0.2s;
  display: inline-flex;
  align-items: center;
  border: none;
  cursor: pointer;
}

/* ===== 滚动指示器 ===== */
.hero-scroll {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.hero-scroll-text {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(205,214,244,0.3);
}

.hero-scroll-arrow {
  width: 22px;
  height: 22px;
  color: rgba(205,214,244,0.25);
}

/* ===== Animation (简化) ===== */
@keyframes heroFloatIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes heroFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.7; }
}

.hero-content .hero-title {
  animation: heroFloatIn 1s ease forwards, heroFloat 6s ease-in-out 1.2s infinite;
}
.hero-content .hero-motd-wrap {
  animation: heroFloatIn 0.7s ease 0.45s forwards;
}
.hero-content .hero-stats {
  animation: heroFloatIn 0.7s ease 0.6s forwards;
}
.hero-content .hero-address {
  animation: heroFloatIn 0.7s ease 0.75s forwards;
}
.status-dot {
  animation: pulse 2s ease-in-out infinite;
}
</style>
</head>
<body>

<section class="hero" id="hero">
  <canvas class="hero-particles" id="hero-particles"></canvas>
  <div class="hero-bg"></div>

  <div class="container hero-content">
    <!-- 标题 -->
    <h1 class="hero-title" id="hero-title">这里是鼐棠。</h1>

    <!-- MOTD -->
    <div class="hero-motd-wrap">
      <div class="hero-motd" id="hero-motd">欢迎加入服务器</div>
    </div>

    <!-- 状态：横排显示 -->
    <div class="hero-stats">
      <div class="hero-stat">
        <span class="hero-stat-value" id="hero-online">1</span>
        <span class="hero-stat-label">在线玩家</span>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <span class="hero-stat-value" id="hero-max">4</span>
        <span class="hero-stat-label">最大人数</span>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <span class="hero-stat-value" id="hero-status-dot">
          <span class="status-dot" style="background: rgb(166, 227, 161);"></span>
        </span>
        <span class="hero-stat-label" id="hero-status-text">在线</span>
      </div>
    </div>

    <!-- 地址 -->
    <div class="hero-address">
      <span class="address-label">服务器地址</span>
      <code class="address-value" id="server-address">mcs.yunaitang.top</code>
      <button class="copy-btn" id="copy-btn" title="复制地址">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>复制
      </button>
    </div>
  </div>

  <!-- 滚动指示 -->
  <div class="hero-scroll" id="hero-scroll">
    <span class="hero-scroll-text">探索更多</span>
    <svg class="hero-scroll-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
  </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server</title>
  <script>try{var _n=localStorage.getItem('mc_site_name');if(_n)document.title=_n}catch(e){}</script>
  <meta name="description" content="Minecraft 服务器官网" />
  <link rel="stylesheet" href="../shared/css/reset.css" />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="css/style.css?v=2" />
  <link rel="stylesheet" href="css/animations.css?v=2" />
  <link rel="stylesheet" href="css/responsive.css?v=2" />
  <script src="vendor/js/echarts.min.js"></script>
  <script src="vendor/js/lucide.min.js"></script>
  <script>
  (function(){
    try {
      var ts = JSON.parse(localStorage.getItem('mc_theme_cache') || '{}');
      var hasCache = Object.keys(ts).length > 0;
      var s = document.createElement('style');
      s.id = 'theme-preload';
      if (!hasCache) { document.head.appendChild(s); return; }
      var dark = ts.color_scheme === 'dark';
      var css = '';
      if (dark) css += ':root{--bg-paper:#1a1a18;--bg-section:#22211e;--text-ink:#d4cfc4;--text-secondary:#a09a8c;--text-muted:#706b60;--border-ink:rgba(200,190,170,0.15);--shadow-paper:0 2px 12px rgba(0,0,0,0.4)}';
      var accents = {vermillion:'#c23a2b',gold:'#b8860b',jade:'#2e8b6d'};
      var ac = accents[ts.accent_color] || '#c23a2b';
      css += ':root{--accent:'+ac+'}';
      s.textContent = css;
      document.head.appendChild(s);
    } catch(e){}
  })();
  </script>
</head>
<body>

  <!-- ===== 左侧书签栏 ===== -->
  <aside class="ink-sidebar" id="ink-sidebar">
    <div class="sidebar-header">
      <a href="#" class="sidebar-logo" id="nav-logo"><script>try{document.write(localStorage.getItem('mc_site_name')||'MC Server')}catch(e){document.write('MC Server')}</script></a>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="sidebar-tab active" data-chapter="prologue">卷首</button>
      <button class="sidebar-tab" data-chapter="gallery" id="tab-gallery">风物</button>
      <button class="sidebar-tab" data-chapter="news">告示</button>
      <button class="sidebar-tab" data-chapter="community" id="tab-community">江湖</button>
    </nav>

    <div class="sidebar-colophon">
      <p class="colophon-name" id="footer-text">Minecraft Server</p>
      <div class="colophon-meta">
        <span id="footer-copyright"></span>
        <span id="footer-meta-dot" hidden>·</span>
        <span id="footer-icp"></span>
      </div>
      <div class="colophon-links">
        <span id="footer-social"></span>
        <span id="footer-links"></span>
      </div>
    </div>
  </aside>

  <!-- ===== 主内容区 ===== -->
  <main class="ink-main" id="ink-main">

    <!-- ===== 第一回：卷首（Hero + Status 合并，左右分栏） ===== -->
    <div class="chapter chapter--prologue active" id="chapter-prologue">
      <div class="prologue-layout">
        <div class="prologue-left">
          <div class="hero-bg hero-bg--ink" aria-hidden="true"></div>
          <div class="prologue-content">
            <h1 class="hero-title" id="hero-title">欢迎来到服务器</h1>
            <div class="hero-motd-wrap">
              <div class="hero-motd" id="hero-motd">&nbsp;</div>
            </div>
            <div class="hero-address">
              <code class="address-value" id="server-address">加载中...</code>
              <button class="copy-btn stamp-btn" id="copy-btn">复制</button>
            </div>
          </div>
        </div>

        <div class="prologue-right">
          <div class="prologue-status-head">
            <div class="seal-stamp" id="hero-status-dot">
              <span class="status-dot"></span>
              <span class="hero-stat-label" id="hero-status-text">检测中</span>
            </div>
            <div class="seal-stamp seal-online">
              <span class="hero-stat-value" id="hero-online">-</span>
              <span class="seal-divider">/</span>
              <span class="hero-stat-value" id="hero-max">-</span>
            </div>
          </div>

          <div class="plaque">
            <div class="plaque-body">
              <span class="plaque-item"><span class="plaque-label">在线</span><span class="plaque-value" id="stat-online">0</span></span>
              <span class="plaque-dot">·</span>
              <span class="plaque-item"><span class="plaque-label">版本</span><span class="plaque-value" id="stat-version">-</span></span>
              <span class="plaque-dot">·</span>
              <span class="plaque-item"><span class="plaque-label">延迟</span><span class="plaque-value" id="stat-latency">-</span></span>
              <span class="plaque-dot">·</span>
              <span class="plaque-item"><span class="plaque-label">查询</span><span class="plaque-value" id="stat-querytime">-</span></span>
            </div>
          </div>

          <div class="status-extra" id="player-list-section" style="display:none">
            <h3 class="ink-heading">在线玩家</h3>
            <div class="player-list" id="player-list"></div>
          </div>

          <div class="status-extra" id="chart-section" style="display:none">
            <h3 class="ink-heading">廿四时趋势</h3>
            <div id="player-chart" style="width:100%;height:220px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== 第二回：风物（图集） ===== -->
    <div class="chapter" id="chapter-gallery" style="display:none">
      <div class="chapter-inner">
        <h2 class="chapter-title">画 · 集</h2>
        <div class="gallery-categories" id="gallery-categories"></div>
        <div class="scroll-gallery">
          <div class="gallery-grid scroll-track" id="gallery-grid"></div>
        </div>
        <div class="load-more" id="gallery-more" style="display:none">
          <button class="btn stamp-btn" id="gallery-load-more">更多</button>
        </div>
      </div>
    </div>

    <!-- ===== 第三回：告示（动态） ===== -->
    <div class="chapter" id="chapter-news">
      <div class="chapter-inner">
        <h2 class="chapter-title">告 · 示</h2>
        <div class="news-categories" id="news-categories"></div>
        <div class="notice-board" id="news-list"></div>
        <div class="load-more" id="news-more" style="display:none">
          <button class="btn stamp-btn" id="news-load-more">更多</button>
        </div>
      </div>
    </div>

    <!-- ===== 第四回：江湖（留言 + 白名单合并） ===== -->
    <div class="chapter" id="chapter-community" style="display:none">
      <div class="chapter-inner">
        <div class="community-tabs">
          <button class="community-tab active" data-pane="comments">题 · 壁</button>
          <button class="community-tab" data-pane="whitelist" id="ctab-whitelist">拜 · 帖</button>
        </div>

        <div class="community-pane active" data-pane="comments" id="pane-comments">
          <div class="letter-paper">
            <form id="comment-form" class="comment-form letter-form">
              <div class="letter-row">
                <label class="letter-label">名号</label>
                <input type="text" id="comment-nickname" placeholder="你的昵称" required />
              </div>
              <div class="letter-row">
                <label class="letter-label">飞鸽</label>
                <input type="email" id="comment-email" placeholder="邮箱（可选）" />
              </div>
              <input type="text" name="website" id="comment-hp" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;" />
              <input type="hidden" id="comment-ts" />
              <div class="letter-row letter-row--full">
                <label class="letter-label">留言</label>
                <textarea id="comment-content" placeholder="写下你的留言..." rows="3" required></textarea>
              </div>
              <div class="letter-row">
                <button type="submit" class="btn stamp-btn">题壁</button>
              </div>
            </form>
          </div>
          <div class="poem-wall" id="comment-marquee">
            <div class="poem-masonry" id="comment-list"></div>
          </div>
        </div>

        <div class="community-pane" data-pane="whitelist" id="pane-whitelist">
          <div class="letter-paper">
            <h3 class="letter-heading">白名单申请</h3>
            <form id="whitelist-form" class="whitelist-form letter-form">
              <div class="letter-row">
                <label class="letter-label">游戏ID</label>
                <input type="text" id="wl-player-name" placeholder="你的游戏名称" required />
              </div>
              <div class="letter-row">
                <label class="letter-label">版本</label>
                <select id="wl-platform">
                  <option value="java">Java 版</option>
                  <option value="bedrock">基岩版</option>
                </select>
              </div>
              <input type="text" name="website" id="wl-hp" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;" />
              <input type="hidden" id="wl-ts" />
              <div class="letter-row">
                <label class="letter-label">联络</label>
                <input type="text" id="wl-contact" placeholder="QQ / 微信" />
              </div>
              <div class="letter-row letter-row--full">
                <label class="letter-label">缘由</label>
                <textarea id="wl-reason" placeholder="申请理由..." rows="2"></textarea>
              </div>
              <div class="letter-row">
                <button type="submit" class="btn stamp-btn">呈递</button>
              </div>
            </form>
          </div>
          <div class="letter-paper" style="margin-top:24px;">
            <h3 class="letter-heading">查询进度</h3>
            <div class="whitelist-check letter-form">
              <div class="letter-row">
                <label class="letter-label">游戏ID</label>
                <input type="text" id="wl-check-name" placeholder="输入游戏ID查询" />
                <button class="btn stamp-btn" id="wl-check-btn">查询</button>
              </div>
              <div id="wl-check-result"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- 文章详情弹窗（书卷全篇） -->
  <div class="modal" id="post-modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-content--post article-scroll-wrap">
      <div class="article-scroll-rod article-scroll-rod--top" aria-hidden="true"></div>
      <div class="article-scroll-paper">
        <button type="button" class="modal-close seal-close" id="post-modal-close" aria-label="关闭">合</button>
        <header class="article-scroll-header">
          <span class="article-scroll-eyebrow">全篇</span>
          <h2 class="article-scroll-title" id="post-detail-title"></h2>
          <div class="article-scroll-rule" aria-hidden="true"></div>
          <div class="article-scroll-meta post-meta" id="post-detail-meta"></div>
        </header>
        <div class="modal-scroll article-scroll-body">
          <div class="post-body article-body-ink" id="post-detail-body"></div>
        </div>
      </div>
      <div class="article-scroll-rod article-scroll-rod--bottom" aria-hidden="true"></div>
    </div>
  </div>

  <!-- Mobile bottom tab bar (hidden on desktop) -->
  <nav class="mobile-tabs" id="mobile-tabs">
    <button class="mobile-tab active" data-chapter="prologue">卷首</button>
    <button class="mobile-tab" data-chapter="gallery" id="mtab-gallery">风物</button>
    <button class="mobile-tab" data-chapter="news">告示</button>
    <button class="mobile-tab" data-chapter="community" id="mtab-community">江湖</button>
  </nav>

  <script src="../shared/js/api-client.js"></script>
  <script src="../shared/js/utils.js"></script>
  <script src="../shared/js/toast.js"></script>
  <script src="../shared/js/lightbox.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js?v=2"></script>
  <script>lucide.createIcons();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server</title>
  <script>try{var _n=localStorage.getItem('mc_site_name');if(_n)document.title=_n}catch(e){}</script>
  <meta name="description" content="Minecraft 服务器官网" />
  <link rel="stylesheet" href="../shared/css/reset.css" />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <script src="vendor/js/echarts.min.js"></script>
  <script src="vendor/js/lucide.min.js"></script>
  <script>
  (function(){
    try {
      var ts = JSON.parse(localStorage.getItem('mc_theme_cache') || '{}');
      var hasCache = Object.keys(ts).length > 0;
      var s = document.createElement('style');
      s.id = 'theme-preload';
      if (!hasCache) { document.head.appendChild(s); return; }
      var ac = ts.accent_color || 'violet';
      var map = { violet:'#7c5cfc', sky:'#3b82f6', emerald:'#10b981', amber:'#f59e0b' };
      var prim = map[ac] || '#7c5cfc';
      s.textContent = ':root{--primary:'+prim+';}';
      document.head.appendChild(s);
    } catch(e){}
  })();
  </script>
</head>
<body class="aether-body">

  <!-- Mesh 渐变背景层 -->
  <div class="mesh-bg" id="mesh-bg" aria-hidden="true">
    <div class="mesh-blob mesh-blob--1"></div>
    <div class="mesh-blob mesh-blob--2"></div>
    <div class="mesh-blob mesh-blob--3"></div>
    <div class="mesh-blob mesh-blob--4"></div>
  </div>

  <!-- 左侧图标条导航 -->
  <nav class="icon-rail" id="navbar">
    <div class="icon-rail__top">
      <a href="#/" class="icon-rail__logo" id="nav-logo" title="首页">
        <i data-lucide="hexagon" aria-hidden="true" id="nav-logo-icon"></i>
        <img id="nav-logo-img" src="" alt="logo" style="display:none;width:32px;height:32px;object-fit:contain;border-radius:6px;" />
      </a>
    </div>
    <div class="icon-rail__nav">
      <a href="#/" class="icon-rail__item active" data-page="home" title="首页">
        <i data-lucide="home" aria-hidden="true"></i>
        <span class="icon-rail__label">首页</span>
      </a>
      <a href="#/gallery" class="icon-rail__item" data-page="gallery" id="slot-gallery" title="图集">
        <i data-lucide="images" aria-hidden="true"></i>
        <span class="icon-rail__label">图集</span>
      </a>
      <a href="#/news" class="icon-rail__item" data-page="news" id="slot-news" title="动态">
        <i data-lucide="newspaper" aria-hidden="true"></i>
        <span class="icon-rail__label">动态</span>
      </a>
      <a href="#/community" class="icon-rail__item" data-page="community" id="slot-community" title="社区">
        <i data-lucide="messages-square" aria-hidden="true"></i>
        <span class="icon-rail__label">社区</span>
      </a>
      <div class="icon-rail__indicator" id="rail-indicator"></div>
    </div>
  </nav>

  <!-- 移动端底部标签栏 -->
  <nav class="mobile-tab-bar" id="mobile-nav" aria-hidden="true">
    <a href="#/" class="tab-bar__item active" data-page="home">
      <i data-lucide="home" aria-hidden="true"></i>
      <span>首页</span>
    </a>
    <a href="#/gallery" class="tab-bar__item" data-page="gallery">
      <i data-lucide="images" aria-hidden="true"></i>
      <span>图集</span>
    </a>
    <a href="#/news" class="tab-bar__item" data-page="news">
      <i data-lucide="newspaper" aria-hidden="true"></i>
      <span>动态</span>
    </a>
    <a href="#/community" class="tab-bar__item" data-page="community">
      <i data-lucide="messages-square" aria-hidden="true"></i>
      <span>社区</span>
    </a>
  </nav>

  <div class="app-wrap">
    <div class="pages-stack">

      <!-- ========== 首页 ========== -->
      <div class="page page--active" data-page="home">
        <section class="hero" id="hero">
          <div class="hero-bg" aria-hidden="true"></div>
          <div class="container hero-inner">
            <div class="hero-glass glass-panel">
              <div class="hero-grid">

                <!-- 左栏：服务器信息 -->
                <div class="hero-info fade-up">
                  <h1 class="hero-title" id="hero-title">欢迎来到服务器</h1>
                  <div class="hero-motd-wrap">
                    <div class="hero-motd" id="hero-motd">&nbsp;</div>
                  </div>
                  <div class="hero-address">
                    <span class="address-label">服务器地址</span>
                    <code class="address-value" id="server-address">加载中...</code>
                    <button type="button" class="btn-glass copy-btn" id="copy-btn">
                      <i data-lucide="copy" class="btn-icon" aria-hidden="true"></i>
                      复制
                    </button>
                  </div>
                  <div class="hero-tags">
                    <span class="hero-tag" id="hero-status-dot">
                      <span class="status-dot" aria-hidden="true"></span>
                      <span id="hero-status-text">检测中</span>
                    </span>
                    <span class="hero-tag" id="tag-version"><span id="stat-version">-</span></span>
                  </div>
                </div>

                <!-- 右栏：环形进度 -->
                <div class="hero-ring-wrap fade-up">
                  <div class="ring-container">
                    <svg class="ring-svg" viewBox="0 0 200 200">
                      <circle class="ring-track" cx="100" cy="100" r="85" />
                      <circle class="ring-fill" id="ring-fill" cx="100" cy="100" r="85" />
                    </svg>
                    <div class="ring-center">
                      <span class="ring-number" id="hero-online">0</span>
                      <span class="ring-divider">/</span>
                      <span class="ring-max" id="hero-max">0</span>
                      <span class="ring-label">在线玩家</span>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </section>

        <!-- 统计卡片 -->
        <section class="section section--stats">
          <div class="container">
            <div class="stat-grid">
              <div class="stat-card glass-panel fade-up">
                <i data-lucide="users" class="stat-card__icon" aria-hidden="true"></i>
                <div class="stat-card__body">
                  <span class="stat-card__label">在线</span>
                  <span class="stat-card__value" id="stat-online">0</span>
                </div>
              </div>
              <div class="stat-card glass-panel fade-up">
                <i data-lucide="gauge" class="stat-card__icon" aria-hidden="true"></i>
                <div class="stat-card__body">
                  <span class="stat-card__label">延迟</span>
                  <span class="stat-card__value" id="stat-latency">-</span>
                </div>
              </div>
              <div class="stat-card glass-panel fade-up">
                <i data-lucide="clock" class="stat-card__icon" aria-hidden="true"></i>
                <div class="stat-card__body">
                  <span class="stat-card__label">上次查询</span>
                  <span class="stat-card__value" id="stat-querytime">-</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 玩家列表 + 图表 -->
        <section class="section section--data" id="status">
          <div class="container">
            <div id="player-list-section" class="data-block fade-up" style="display:none">
              <h3 class="data-block__title">在线玩家</h3>
              <div class="player-list player-grid" id="player-list"></div>
            </div>
            <div id="chart-section" class="data-block fade-up" style="display:none">
              <h3 class="data-block__title">24 小时在线趋势</h3>
              <div class="chart-wrap glass-panel">
                <div id="player-chart" style="width:100%;height:280px;"></div>
              </div>
            </div>
          </div>
        </section>
      </div>

      <!-- ========== 图集页 ========== -->
      <div class="page" data-page="gallery" style="display:none">
        <section class="section section--page" id="gallery">
          <div class="container">
            <h2 class="page-title fade-up">图集</h2>
            <div id="gallery-categories" class="category-bar fade-up"></div>
            <div id="gallery-grid" class="gallery-grid fade-up"></div>
            <div id="gallery-more" class="load-more-wrap" style="display:none">
              <button type="button" id="gallery-load-more" class="btn-glass btn-glass--primary">加载更多</button>
            </div>
          </div>
        </section>
      </div>

      <!-- ========== 动态页 ========== -->
      <div class="page" data-page="news" style="display:none">
        <section class="section section--page" id="news">
          <div class="container">
            <h2 class="page-title fade-up">动态</h2>
            <div id="news-categories" class="category-bar fade-up"></div>
            <div id="news-list" class="news-feed fade-up"></div>
            <div id="news-more" class="load-more-wrap" style="display:none">
              <button type="button" id="news-load-more" class="btn-glass btn-glass--primary">加载更多</button>
            </div>
          </div>
        </section>
      </div>

      <!-- ========== 社区页 ========== -->
      <div class="page" data-page="community" style="display:none">
        <section class="section section--page section--community">
          <div class="container">
            <h2 class="page-title fade-up">社区</h2>
            <div class="community-tabs fade-up">
              <button type="button" class="community-tab active" data-pane="comments" id="ctab-comments">留言板</button>
              <button type="button" class="community-tab" data-pane="whitelist" id="ctab-whitelist">白名单</button>
            </div>

            <div class="community-pane active" data-pane="comments" id="comments">
              <form id="comment-form" class="glass-form">
                <div class="form-row">
                  <input type="text" id="comment-nickname" placeholder="你的昵称 *" required />
                  <input type="email" id="comment-email" placeholder="邮箱（可选）" />
                </div>
                <input type="text" name="website" id="comment-hp" autocomplete="off" tabindex="-1"
                  style="position:absolute;left:-9999px;opacity:0;height:0;" />
                <input type="hidden" id="comment-ts" />
                <textarea id="comment-content" placeholder="写下你的留言..." rows="4" required></textarea>
                <button type="submit" class="btn-glass btn-glass--primary">提交留言</button>
              </form>
              <div id="comment-marquee" class="comment-wall">
                <div id="comment-list" class="comment-stream"></div>
              </div>
            </div>

            <div class="community-pane" data-pane="whitelist" id="whitelist" style="display:none">
              <form id="whitelist-form" class="glass-form">
                <div class="form-row">
                  <input type="text" id="wl-player-name" placeholder="游戏ID *" required />
                  <select id="wl-platform">
                    <option value="java">Java 版</option>
                    <option value="bedrock">基岩版</option>
                  </select>
                </div>
                <input type="text" name="website" id="wl-hp" autocomplete="off" tabindex="-1"
                  style="position:absolute;left:-9999px;opacity:0;height:0;" />
                <input type="hidden" id="wl-ts" />
                <input type="text" id="wl-contact" placeholder="联系方式（QQ/微信）" />
                <textarea id="wl-reason" placeholder="申请理由..." rows="3"></textarea>
                <button type="submit" class="btn-glass btn-glass--primary">提交申请</button>
              </form>
              <div class="glass-form">
                <div class="wl-check-row">
                  <input type="text" id="wl-check-name" placeholder="输入游戏ID查询" />
                  <button type="button" id="wl-check-btn" class="btn-glass">查询</button>
                </div>
                <div id="wl-check-result"></div>
              </div>
            </div>
          </div>
        </section>
      </div>

    </div>

    <footer class="page-footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <span class="footer-brand" id="footer-text">Minecraft Server</span>
          <span class="footer-copy">
            <span id="footer-copyright"></span>
            <span id="footer-meta-dot" class="footer-dot" hidden> · </span>
            <span id="footer-icp"></span>
          </span>
        </div>
        <div class="footer-right">
          <div id="footer-social" class="footer-social"></div>
          <div id="footer-contacts" class="footer-social"></div>
          <div id="footer-links" class="footer-links"></div>
        </div>
      </div>
      <div id="footer-custom-html" class="footer-custom-html"></div>
    </footer>
  </div>

  <!-- 文章详情：右侧抽屉 -->
  <div class="modal drawer" id="post-modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content drawer-panel">
      <button type="button" class="modal-close" id="post-modal-close" aria-label="关闭">
        <i data-lucide="x" aria-hidden="true"></i>
      </button>
      <div class="modal-scroll">
        <h2 id="post-detail-title"></h2>
        <div class="post-meta" id="post-detail-meta"></div>
        <div class="post-body" id="post-detail-body"></div>
      </div>
    </div>
  </div>

  <script src="../shared/js/api-client.js"></script>
  <script src="../shared/js/utils.js"></script>
  <script src="../shared/js/toast.js"></script>
  <script src="../shared/js/lightbox.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js?v=2"></script>
  <script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
  </script>
</body>
</html>

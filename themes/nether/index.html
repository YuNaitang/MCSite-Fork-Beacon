<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server</title>
  <script>try{var _n=localStorage.getItem('mc_site_name');if(_n)document.title=_n}catch(e){}</script>
  <meta name="description" content="Minecraft 服务器官网" />
  <link rel="stylesheet" href="../shared/css/reset.css" />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <script src="vendor/js/echarts.min.js"></script>
  <script src="vendor/js/lucide.min.js"></script>
  <script>
  (function(){
    try {
      var ts = JSON.parse(localStorage.getItem('mc_theme_cache') || '{}');
      var hasCache = Object.keys(ts).length > 0;
      var s = document.createElement('style');
      s.id = 'theme-preload';
      if (!hasCache) { document.head.appendChild(s); return; }
      var ac = ts.accent_color || 'lava';
      var prim = ac === 'soul' ? '#3ECFCF' : (ac === 'redstone' ? '#FF4444' : '#FF6B35');
      s.textContent = ':root{--primary:'+prim+';}';
      document.head.appendChild(s);
    } catch(e){}
  })();
  </script>
</head>
<body class="nether-body">

  <nav class="nether-nav" id="navbar">
    <div class="nether-nav__inner container">
      <a href="#/" class="nether-nav__brand" id="nav-logo">MC Server</a>
      <button type="button" class="nav-toggle" id="nav-toggle" aria-label="打开菜单" aria-expanded="false">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <div class="nav-links nether-nav__links">
        <a href="#/" class="nether-nav__link active" data-page="home">
          <i data-lucide="home" class="nether-nav__icon" aria-hidden="true"></i>
          <span>首页</span>
        </a>
        <a href="#/gallery" class="nether-nav__link" data-page="gallery" id="slot-gallery">
          <i data-lucide="images" class="nether-nav__icon" aria-hidden="true"></i>
          <span>图集</span>
        </a>
        <a href="#/news" class="nether-nav__link" data-page="news" id="slot-news">
          <i data-lucide="newspaper" class="nether-nav__icon" aria-hidden="true"></i>
          <span>动态</span>
        </a>
        <a href="#/community" class="nether-nav__link" data-page="community" id="slot-community">
          <i data-lucide="messages-square" class="nether-nav__icon" aria-hidden="true"></i>
          <span>社区</span>
        </a>
      </div>
    </div>
    <div class="nether-nav__glow" aria-hidden="true"></div>
  </nav>

  <div class="app-wrap">

    <!-- 固定岩浆辉光环境层 -->
    <div class="forge-ambient" aria-hidden="true">
      <div class="forge-emb forge-emb--1"></div>
      <div class="forge-emb forge-emb--2"></div>
      <div class="forge-emb forge-emb--3"></div>
    </div>

    <div class="pages-stack">

      <!-- 首页：Hero + 状态区（玩家/图表） -->
      <div class="page page--active" data-page="home">
        <section class="hero" id="hero">
          <div class="hero-bg" aria-hidden="true"></div>
          <div class="container hero-inner">
            <div class="hero-content hero-grid">
              <div class="hero-info fade-up">
                <h1 class="hero-title" id="hero-title">欢迎来到服务器</h1>
                <div class="hero-motd-wrap">
                  <div class="hero-motd" id="hero-motd">&nbsp;</div>
                </div>
                <div class="hero-address">
                  <span class="address-label">服务器地址</span>
                  <code class="address-value" id="server-address">加载中...</code>
                  <button type="button" class="copy-btn" id="copy-btn">复制</button>
                </div>
              </div>

              <div class="hero-dashboard fade-up">
                <div class="dashboard-panel">
                  <div class="dashboard-head">
                    <span class="dashboard-label">熔炉状态</span>
                    <span class="dashboard-status" id="hero-status-dot">
                      <span class="status-dot" aria-hidden="true"></span>
                      <span id="hero-status-text">检测中</span>
                    </span>
                  </div>
                  <div class="gauge-lava-wrap" aria-label="在线人数液位">
                    <div class="gauge-lava-fill" id="lava-fill"></div>
                    <div class="gauge-lava-meta">
                      <span><span id="hero-online">-</span> / <span id="hero-max">-</span> 人在线</span>
                    </div>
                  </div>
                  <div class="dashboard-stats">
                    <div class="stat-cell stat-nameplate">
                      <span class="stat-cell-label">在线</span>
                      <span class="stat-cell-value" id="stat-online">0</span>
                    </div>
                    <div class="stat-cell stat-nameplate">
                      <span class="stat-cell-label">版本</span>
                      <span class="stat-cell-value" id="stat-version">-</span>
                    </div>
                    <div class="stat-cell stat-thermometer">
                      <span class="stat-cell-label">延迟</span>
                      <span class="stat-cell-value" id="stat-latency">-</span>
                    </div>
                    <div class="stat-cell stat-clock">
                      <span class="stat-cell-label">查询</span>
                      <span class="stat-cell-value" id="stat-querytime">-</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section section--forge" id="status">
          <div class="container">
            <h2 class="section-title fade-up">熔炉与趋势</h2>
            <div id="player-list-section" class="forge-players fade-up" style="display:none">
              <h3 class="forge-subtitle">在线玩家</h3>
              <div class="player-list forge-slots" id="player-list"></div>
            </div>
            <div id="chart-section" class="forge-chart fade-up" style="display:none">
              <h3 class="forge-subtitle">24 小时在线</h3>
              <div id="player-chart" style="width:100%;height:280px;"></div>
            </div>
          </div>
        </section>
      </div>

      <!-- 图集页 -->
      <div class="page" data-page="gallery" style="display:none">
        <section class="section section--page" id="gallery">
          <div class="container">
            <h2 class="page-title fade-up">图集</h2>
            <div id="gallery-categories" class="category-bar fade-up"></div>
            <div id="gallery-grid" class="nether-grid fade-up"></div>
            <div id="gallery-more" class="load-more-wrap" style="display:none">
              <button type="button" id="gallery-load-more" class="btn-forge">加载更多</button>
            </div>
          </div>
        </section>
      </div>

      <!-- 动态页 -->
      <div class="page" data-page="news" style="display:none">
        <section class="section section--page" id="news">
          <div class="container">
            <h2 class="page-title fade-up">动态</h2>
            <div id="news-categories" class="category-bar fade-up"></div>
            <div id="news-list" class="timeline fade-up"></div>
            <div id="news-more" class="load-more-wrap" style="display:none">
              <button type="button" id="news-load-more" class="btn-forge">加载更多</button>
            </div>
          </div>
        </section>
      </div>

      <!-- 社区页：留言 + 白名单 Tab -->
      <div class="page" data-page="community" style="display:none">
        <section class="section section--page section--community">
          <div class="container">
            <h2 class="page-title fade-up">社区</h2>
            <div class="community-tabs fade-up">
              <button type="button" class="community-tab active" data-pane="comments" id="ctab-comments">留言板</button>
              <button type="button" class="community-tab" data-pane="whitelist" id="ctab-whitelist">白名单</button>
            </div>

            <div class="community-pane active" data-pane="comments" id="comments">
              <form id="comment-form" class="forge-form">
                <div class="form-row">
                  <input type="text" id="comment-nickname" placeholder="你的昵称 *" required />
                  <input type="email" id="comment-email" placeholder="邮箱（可选）" />
                </div>
                <input type="text" name="website" id="comment-hp" autocomplete="off" tabindex="-1"
                  style="position:absolute;left:-9999px;opacity:0;height:0;" />
                <input type="hidden" id="comment-ts" />
                <textarea id="comment-content" placeholder="写下你的留言..." rows="4" required></textarea>
                <button type="submit" class="btn-forge">提交留言</button>
              </form>
              <div id="comment-marquee" class="chat-window">
                <div id="comment-list" class="chat-stream"></div>
              </div>
            </div>

            <div class="community-pane" data-pane="whitelist" id="whitelist" style="display:none">
              <form id="whitelist-form" class="forge-form">
                <div class="form-row">
                  <input type="text" id="wl-player-name" placeholder="游戏ID *" required />
                  <select id="wl-platform">
                    <option value="java">Java 版</option>
                    <option value="bedrock">基岩版</option>
                  </select>
                </div>
                <input type="text" name="website" id="wl-hp" autocomplete="off" tabindex="-1"
                  style="position:absolute;left:-9999px;opacity:0;height:0;" />
                <input type="hidden" id="wl-ts" />
                <input type="text" id="wl-contact" placeholder="联系方式（QQ/微信）" />
                <textarea id="wl-reason" placeholder="申请理由..." rows="3"></textarea>
                <button type="submit" class="btn-forge">提交申请</button>
              </form>
              <div class="whitelist-check forge-form">
                <div class="wl-check-row">
                  <input type="text" id="wl-check-name" placeholder="输入游戏ID查询" />
                  <button type="button" id="wl-check-btn" class="btn-forge btn-forge--ghost">查询</button>
                </div>
                <div id="wl-check-result"></div>
              </div>
            </div>
          </div>
        </section>
      </div>

    </div>

    <footer class="page-footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <span class="footer-brand" id="footer-text">Minecraft Server</span>
          <span class="footer-copy">
            <span id="footer-copyright"></span>
            <span id="footer-meta-dot" class="footer-dot" hidden> · </span>
            <span id="footer-icp"></span>
          </span>
        </div>
        <div class="footer-right">
          <div id="footer-social" class="footer-social"></div>
          <div id="footer-links" class="footer-links"></div>
        </div>
      </div>
    </footer>
  </div>

  <!-- 文章详情：右侧抽屉 -->
  <div class="modal drawer" id="post-modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content drawer-panel">
      <button type="button" class="modal-close" id="post-modal-close" aria-label="关闭">&times;</button>
      <div class="modal-scroll">
        <h2 id="post-detail-title"></h2>
        <div class="post-meta" id="post-detail-meta"></div>
        <div class="post-body" id="post-detail-body"></div>
      </div>
    </div>
  </div>

  <script src="../shared/js/api-client.js"></script>
  <script src="../shared/js/utils.js"></script>
  <script src="../shared/js/toast.js"></script>
  <script src="../shared/js/lightbox.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
  </script>
</body>
</html>
